apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: nagp-assignment
data:
  01-init.sql: |
    CREATE TABLE IF NOT EXISTS finops_workloads (
      id SERIAL PRIMARY KEY,
      name TEXT NOT NULL UNIQUE,
      category TEXT NOT NULL,
      monthly_cost NUMERIC(10,2) NOT NULL,
      updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    INSERT INTO finops_workloads (name, category, monthly_cost)
    VALUES
      ('checkout-service', 'customer-facing', 81.50),
      ('inventory-sync', 'integration', 55.20),
      ('recommendation-engine', 'analytics', 96.00),
      ('billing-reporter', 'finance', 44.10),
      ('email-dispatcher', 'communication', 31.75),
      ('ops-dashboard', 'platform', 62.80)
    ON CONFLICT (name) DO NOTHING;

